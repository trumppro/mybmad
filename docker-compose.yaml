# oahs local stack — self-host-shaped from day 1 (product-roadmap.md §7).
#
#   cp .env.example .env               # fill OAHS_MODEL_*; set OAHS_ADMIN_TOKEN
#   docker compose up -d --build oahs  # → http://localhost:4521/ui
#
# The app persists to a durable PGlite volume (/data) — NO database service is
# required to run. The postgres service is kept behind a profile for the future
# DATABASE_URL path (roadmap §11, Phase 11 story 1); the spine does not use it yet.
#   docker compose --profile postgres up -d postgres
#
# The `dispatcher` (§10.2) runs under the `runtime` profile — the ONLY service
# holding the docker socket AND the model keys (.env). The spine service holds
# NEITHER: it decides what runs, it does not run it (§4.3, D13).
#   docker compose --profile runtime up -d --build dispatcher
services:
  oahs:
    build:
      context: .
      dockerfile: apps/oahs/Dockerfile
    image: oahs:local
    # §10.2: the spine holds NO model keys — OAHS_MODEL_* moved to the `runtime`
    # profile (the dispatcher/agent runtime). §0.1: the spine is not the gateway.
    environment:
      # UNSET by default, and that is the safe setting: `oahs serve` then generates
      # a random admin token and prints it (`docker compose logs oahs`). It used to
      # default to `change-me`, which OVERRODE that safety on a published port —
      # anyone who guessed one word was workspace admin. Set it in .env only when
      # you want a stable credential.
      OAHS_ADMIN_TOKEN: ${OAHS_ADMIN_TOKEN:-}
      OAHS_PORT: ${OAHS_PORT:-4521}
    # `oahs serve` binds 0.0.0.0 INSIDE the container (serve.ts, no --host flag) —
    # correct, because docker does the publishing. The publish below is what decides
    # exposure, and it is loopback-only: the spine has no user auth beyond a bearer
    # token over plaintext HTTP, so it must not be reachable from the network until
    # it does. Change to "${OAHS_PORT}:${OAHS_PORT}" deliberately, not by default.
    command: ["serve", "--data", "/data", "--port", "${OAHS_PORT:-4521}"]
    ports:
      - "127.0.0.1:${OAHS_PORT:-4521}:${OAHS_PORT:-4521}"
    volumes:
      - oahs-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.OAHS_PORT||4521)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # §10.2 — the container dispatcher: claims ready items on the spine and runs
  # each in a one-shot agent-runtime container. It is the SOLE holder of the
  # docker socket and the model keys; the spine service above has neither.
  dispatcher:
    profiles: ["runtime"] # opt-in: `docker compose --profile runtime up dispatcher`
    build:
      context: .
      dockerfile: apps/oahs/Dockerfile.runner
      args:
        AGENT_NPM: ${OAHS_AGENT_NPM:-}
    image: oahs-runner:local
    depends_on:
      oahs:
        condition: service_healthy
    # The dispatcher (host) holds the model keys (OAHS_MODEL_*) and AUTO-FORWARDS
    # them to the AGENT child inside each container via the inner `oahs work
    # --agent-env` (see `oahs dispatch` in cli.ts) — never into a container's
    # scoped-token env, never to the spine (§0.1). Optional so the profile still
    # builds without a filled .env.
    env_file:
      - path: .env
        required: false
    environment:
      # The dispatcher authenticates to the spine as a runner identity, then mints
      # a per-claim scoped token for each container (§10.1). OAHS_TOKEN is the
      # STATIC runner token — it never enters an agent container.
      OAHS_URL: http://oahs:${OAHS_PORT:-4521}
      OAHS_TOKEN: ${OAHS_RUNNER_TOKEN:-}
    # The ONE process that may spawn work → the ONE socket binding (§4.3). The
    # dispatcher reads only the spine, never the repo, so it needs the socket
    # alone — not a repo mount of its own.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # `oahs dispatch` — poll+claim on the host, container-per-claim. --repo is the
    # HOST-daemon path (docker-out-of-docker: the sibling `docker run -v` bind is
    # resolved by the host, not inside this container), so it must be ABSOLUTE.
    #
    # It is left EMPTY rather than `${OAHS_REPO_PATH:?...}`: compose interpolates
    # the whole file BEFORE it filters by profile, so a required variable on this
    # opt-in `runtime` service made every ordinary `docker compose` command fail —
    # including the `up -d --build oahs` in this file's own header. `oahs dispatch`
    # rejects an empty --repo with a readable error, so the requirement is enforced
    # where it applies: when you actually start the dispatcher.
    command:
      [
        "oahs",
        "dispatch",
        "--image",
        "oahs-runner:local",
        "--repo",
        "${OAHS_REPO_PATH:-}",
        "--spec-folder",
        "${OAHS_SPEC_FOLDER:-delivery/main}",
        "--agent-cmd",
        "${OAHS_AGENT_CMD:-echo no-agent}",
      ]
    restart: unless-stopped

  postgres:
    profiles: ["postgres"] # opt-in: the app does not use this yet (roadmap §11)
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oahs
      POSTGRES_PASSWORD: oahs
      POSTGRES_DB: oahs
    ports:
      - "5433:5432"
    volumes:
      - oahs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oahs"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oahs-data: {}
  oahs-pgdata: {}
