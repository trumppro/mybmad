# oahs local stack — self-host-shaped from day 1 (product-roadmap.md §7).
#
#   cp .env.example .env               # fill OAHS_MODEL_*; set OAHS_ADMIN_TOKEN
#   docker compose up -d --build oahs  # → http://localhost:4521/ui
#
# The app persists to a durable PGlite volume (/data) — NO database service is
# required to run. The postgres service is kept behind a profile for the future
# DATABASE_URL path (roadmap §11, Phase 11 story 1); the spine does not use it yet.
#   docker compose --profile postgres up -d postgres
services:
  oahs:
    build:
      context: .
      dockerfile: apps/oahs/Dockerfile
    image: oahs:local
    # Gateway creds (OAHS_MODEL_*) live in .env; optional so `up` works without it.
    env_file:
      - path: .env
        required: false
    environment:
      OAHS_ADMIN_TOKEN: ${OAHS_ADMIN_TOKEN:-change-me}
      OAHS_PORT: ${OAHS_PORT:-4521}
    # `oahs serve` binds 0.0.0.0 by default (serve.ts) — no --host flag exists.
    command: ["serve", "--data", "/data", "--port", "${OAHS_PORT:-4521}"]
    ports:
      - "${OAHS_PORT:-4521}:${OAHS_PORT:-4521}"
    volumes:
      - oahs-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.OAHS_PORT||4521)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    profiles: ["postgres"] # opt-in: the app does not use this yet (roadmap §11)
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oahs
      POSTGRES_PASSWORD: oahs
      POSTGRES_DB: oahs
    ports:
      - "5433:5432"
    volumes:
      - oahs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oahs"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oahs-data: {}
  oahs-pgdata: {}
