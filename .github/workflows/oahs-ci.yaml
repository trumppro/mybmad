# oahs platform CI — the PRIMARY pipeline (the repo's origin is GitHub).
# Net-new and SEPARATE from the upstream BMAD workflows in this directory
# (roadmap §8 / decision D15). The GitLab mirror runs the equivalent .gitlab-ci.yml.
#
# It enforces, on every push and pull request that touches the platform:
#   * spine purity — grep 1: no LLM-provider SDK inside packages/{core,db,contracts}
#     + apps/spine-api (§0.1); grep 2: no @oahs/gateway import in the same trees (§2.5);
#     grep 3: no TODO/FIXME/TBD/LOREM markers in delivery/ or docs/oahs/;
#   * make check — typecheck + every @oahs/* suite (incl. the packages/db pg-engine
#     parity run that re-executes the core conformance suite against PGlite).
#
# pnpm-lock.yaml and pnpm-workspace.yaml are COMMITTED (see .gitignore). Until they
# were, `pnpm install --frozen-lockfile` below could only ever fail with
# ERR_PNPM_NO_LOCKFILE — so `make check` gated nothing, and spine-purity's three
# greps were the entire pipeline.

name: oahs CI

# NO `paths:` filter, on purpose. Two reasons, both learned the hard way:
#   * these checks are meant to be REQUIRED for merging, and a path-filtered check
#     simply never reports on a PR that misses the filter — GitHub then blocks that
#     PR forever on "Expected — Waiting for status", which looks like a hung CI
#     rather than a misconfigured one;
#   * the filter was already wrong: it did not list `scripts/**`, so a change to
#     the dispatch e2e — which IS one of these jobs — ran nothing at all.
# The whole pipeline is ~4 minutes. That is cheaper than either failure mode.
on: [push, pull_request]

jobs:
  spine-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 'grep 1/3 — no LLM-provider SDK inside the spine (§0.1)'
        run: |
          if grep -rnE '@anthropic-ai/|openai|@google/generative|mistralai|cohere|ollama' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§0.1): an LLM-provider SDK reference is inside the spine"; exit 1
          fi
      - name: 'grep 2/3 — no @oahs/gateway import inside the spine (§2.5)'
        run: |
          if grep -rn '@oahs/gateway' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§2.5): @oahs/gateway is imported inside the spine"; exit 1
          fi
      - name: 'grep 3/3 — no unfinished-work markers in delivery/ or docs/oahs/'
        run: |
          if grep -rnE '\b(TODO|FIXME|TBD|LOREM IPSUM)\b' delivery/ docs/oahs/; then
            echo "FAIL: an unfinished-work marker is in delivery/ or docs/oahs/"; exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: make check
        run: make check

  # The §10.2/§10.3 container path, against a REAL docker daemon. Everything else
  # that covers the dispatcher injects a fake spawner, so before this job the agent
  # image had never been built and no claim container had ever started — Phase 10's
  # confidence came entirely from stubs. It found four defects on first contact
  # (see scripts/e2e-dispatch.sh). ubuntu-latest ships docker; the runner shares the
  # host network namespace, which is why the script routes the container via
  # --network host there and host.docker.internal on Docker Desktop.
  dispatch-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build the CLI (the e2e drives the real bin)
        run: make build
      - name: Build the images — both of them, for the first time in CI
        run: |
          docker build -f apps/oahs/Dockerfile -t oahs:local .
          docker build -f apps/oahs/Dockerfile.runner -t oahs-runner:local .
          docker build -f apps/oahs/Dockerfile.runner --target dispatcher -t oahs-dispatcher:local .
      - name: The dispatcher must have a docker client; the AGENT image must not
        run: |
          docker run --rm oahs-dispatcher:local docker --version
          if docker run --rm oahs-runner:local sh -c 'command -v docker' >/dev/null 2>&1; then
            echo "FAIL: the agent runtime carries a docker client — one stray socket mount from host root"; exit 1
          fi
      - name: End-to-end dispatch through a real container
        run: ./scripts/e2e-dispatch.sh
