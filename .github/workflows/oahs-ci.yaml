# oahs platform CI — the PRIMARY pipeline (the repo's origin is GitHub).
# Net-new and SEPARATE from the upstream BMAD workflows in this directory
# (roadmap §8 / decision D15). The GitLab mirror runs the equivalent .gitlab-ci.yml.
#
# It enforces, on every push and pull request that touches the platform:
#   * spine purity — grep 1: no LLM-provider SDK inside packages/{core,db,contracts}
#     + apps/spine-api (§0.1); grep 2: no @oahs/gateway import in the same trees (§2.5);
#     grep 3: no TODO/FIXME/TBD/LOREM markers in delivery/ or docs/oahs/;
#   * make check — typecheck + every @oahs/* suite (incl. the packages/db pg-engine
#     parity run that re-executes the core conformance suite against PGlite);
#   * tools — the CARRIED BMAD tree, which had no CI at all until 2026-07-17;
#   * style — eslint + prettier + markdownlint, repo-wide.
#
# pnpm-lock.yaml and pnpm-workspace.yaml are COMMITTED (see .gitignore). Until they
# were, `pnpm install --frozen-lockfile` below could only ever fail with
# ERR_PNPM_NO_LOCKFILE — so `make check` gated nothing, and spine-purity's three
# greps were the entire pipeline.

name: oahs CI

# NO `paths:` filter, on purpose. Two reasons, both learned the hard way:
#   * these checks are meant to be REQUIRED for merging, and a path-filtered check
#     simply never reports on a PR that misses the filter — GitHub then blocks that
#     PR forever on "Expected — Waiting for status", which looks like a hung CI
#     rather than a misconfigured one;
#   * the filter was already wrong: it did not list `scripts/**`, so a change to
#     the dispatch e2e — which IS one of these jobs — ran nothing at all.
# The whole pipeline is ~4 minutes. That is cheaper than either failure mode.
on: [push, pull_request]

jobs:
  spine-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "grep 1/3 — no LLM-provider SDK inside the spine (§0.1)"
        run: |
          if grep -rnE '@anthropic-ai/|openai|@google/generative|mistralai|cohere|ollama' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§0.1): an LLM-provider SDK reference is inside the spine"; exit 1
          fi
      - name: "grep 2/3 — no @oahs/gateway import inside the spine (§2.5)"
        run: |
          if grep -rn '@oahs/gateway' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§2.5): @oahs/gateway is imported inside the spine"; exit 1
          fi
      - name: "grep 3/3 — no unfinished-work markers in delivery/ or docs/oahs/"
        run: |
          if grep -rnE '\b(TODO|FIXME|TBD|LOREM IPSUM)\b' delivery/ docs/oahs/; then
            echo "FAIL: an unfinished-work marker is in delivery/ or docs/oahs/"; exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: make check
        run: make check

  # The carried upstream tree: tools/ and the installer. It had NO CI, ever — and not
  # because quality.yaml was deleted. quality.yaml ran `npm ci`, which cannot work in
  # a pnpm workspace with no package-lock.json, so it was red 15/15 from this fork's
  # first commit and never executed a single one of these suites. Deleting it lost
  # nothing; there was never anything to lose.
  #
  # All six of upstream's suites pass under pnpm, in ~2 seconds total, and each one
  # `require()`s tools/ directly (installer core, manifest, validate-file-refs,
  # channel-plan/resolver, custom-module-manager, validate-skills). Nobody had tried.
  #
  # This matters now because the fork EDITS this tree: tools/oahs-bootstrap.sh and
  # tools/team-seed.sh are net-new, and tools/installer/bmad-cli.js carries the one
  # fork edit in the installer.
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      # test:renderer runs src/bmm-skills/4-implementation/bmad-quick-dev/render.py,
      # which imports tomllib — stdlib only since 3.11. Pinned rather than inherited
      # so a runner-image bump cannot silently take this job out. (It is also why the
      # suite looks broken on macOS: /usr/bin/python3 there is 3.9.)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile

      - name: "upstream's own suites — each one requires() tools/ directly"
        run: |
          pnpm run test:refs
          pnpm run test:install
          pnpm run test:urls
          pnpm run test:channels
          pnpm run test:skills
          pnpm run test:renderer
          pnpm run validate:refs
          pnpm run validate:skills

      # The carried installer hardcodes upstream's package name and would tell fork
      # users to install upstream over us. Asserts both halves of the gate: the guard
      # in bmad-cli.js AND `private: true` in the manifest it reads.
      - name: the fork's guard on the carried installer
        run: pnpm run test:fork-gate

      # The fork's OWN shell only. tools/validate-svg-changes.sh is upstream's and
      # trips 3 info-level SC2086s we have no business rewriting.
      - name: shellcheck the fork's shell scripts
        run: |
          shellcheck --version
          shellcheck tools/oahs-bootstrap.sh tools/team-seed.sh scripts/e2e-dispatch.sh

  # Repo-wide style: ESLint, Prettier, markdownlint. Green as of 2026-07-17 — before
  # that all three were red and nothing ran them (quality.yaml, their only caller,
  # died at `npm ci` on every push). Wiring them in is the whole point: a style check
  # that is green but ungated is green until the next commit.
  #
  # Scope is set by .prettierignore and eslint.config.mjs, not here. Both deliberately
  # exclude packages/, apps/ and delivery/ — the oahs workspaces own their toolchain
  # (TS strict + vitest) and `make check` gates them.
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm run lint
      - name: Prettier
        run: pnpm run format:check
      - name: markdownlint
        run: pnpm run lint:md

      # NOTE for whoever edits the comments in this file: a YAML comment that begins
      # with `# eslint` is an ESLint DIRECTIVE, not prose. The first version of the
      # block above started "# eslint + prettier + markdownlint" and eslint tried to
      # parse the rest of the sentence as a rule config, failing the very job it
      # describes. Start such comments with anything else.

  # The §10.2/§10.3 container path, against a REAL docker daemon. Everything else
  # that covers the dispatcher injects a fake spawner, so before this job the agent
  # image had never been built and no claim container had ever started — Phase 10's
  # confidence came entirely from stubs. It found four defects on first contact
  # (see scripts/e2e-dispatch.sh). ubuntu-latest ships docker; the runner shares the
  # host network namespace, which is why the script routes the container via
  # --network host there and host.docker.internal on Docker Desktop.
  dispatch-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build the CLI (the e2e drives the real bin)
        run: make build
      - name: Build the images — both of them, for the first time in CI
        run: |
          docker build -f apps/oahs/Dockerfile -t oahs:local .
          docker build -f apps/oahs/Dockerfile.runner -t oahs-runner:local .
          docker build -f apps/oahs/Dockerfile.runner --target dispatcher -t oahs-dispatcher:local .
      - name: The dispatcher must have a docker client; the AGENT image must not
        run: |
          docker run --rm oahs-dispatcher:local docker --version
          if docker run --rm oahs-runner:local sh -c 'command -v docker' >/dev/null 2>&1; then
            echo "FAIL: the agent runtime carries a docker client — one stray socket mount from host root"; exit 1
          fi
      - name: End-to-end dispatch through a real container
        run: ./scripts/e2e-dispatch.sh
