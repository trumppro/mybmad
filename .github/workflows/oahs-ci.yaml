# oahs platform CI — the PRIMARY pipeline (the repo's origin is GitHub).
# Net-new and SEPARATE from the upstream BMAD workflows in this directory
# (roadmap §8 / decision D15). The GitLab mirror runs the equivalent .gitlab-ci.yml.
#
# It enforces, on every push and pull request that touches the platform:
#   * spine purity — grep 1: no LLM-provider SDK inside packages/{core,db,contracts}
#     + apps/spine-api (§0.1); grep 2: no @oahs/gateway import in the same trees (§2.5);
#     grep 3: no TODO/FIXME/TBD/LOREM markers in delivery/ or docs/oahs/;
#   * make check — typecheck + every @oahs/* suite (incl. the packages/db pg-engine
#     parity run that re-executes the core conformance suite against PGlite).
#
# pnpm-workspace.yaml is gitignored by design (see docs/oahs/); CI regenerates it.

name: oahs CI

on:
  push:
    paths: &oahs_paths
      - 'packages/**'
      - 'apps/**'
      - 'Makefile'
      - '.nvmrc'
      - 'pnpm-lock.yaml'
      - 'delivery/**'
      - 'docs/oahs/**'
      - '.github/workflows/oahs-ci.yaml'
      - '.gitlab-ci.yml'
  pull_request:
    paths: *oahs_paths

jobs:
  spine-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 'grep 1/3 — no LLM-provider SDK inside the spine (§0.1)'
        run: |
          if grep -rnE '@anthropic-ai/|openai|@google/generative|mistralai|cohere|ollama' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§0.1): an LLM-provider SDK reference is inside the spine"; exit 1
          fi
      - name: 'grep 2/3 — no @oahs/gateway import inside the spine (§2.5)'
        run: |
          if grep -rn '@oahs/gateway' packages/core/src packages/db/src packages/contracts/src apps/spine-api/src; then
            echo "FAIL (§2.5): @oahs/gateway is imported inside the spine"; exit 1
          fi
      - name: 'grep 3/3 — no unfinished-work markers in delivery/ or docs/oahs/'
        run: |
          if grep -rnE '\b(TODO|FIXME|TBD|LOREM IPSUM)\b' delivery/ docs/oahs/; then
            echo "FAIL: an unfinished-work marker is in delivery/ or docs/oahs/"; exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
      - name: Generate the gitignored workspace file
        run: |
          printf 'packages:\n  - packages/*\n  - apps/*\nallowBuilds:\n  esbuild: true\n  sharp: true\n  unrs-resolver: true\n' > pnpm-workspace.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: make check
        run: make check
